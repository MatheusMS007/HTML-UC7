<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <script src="lista.js"></script> <!-- Liga o JavaScript ao HTML -->
</head>

<body>
    <header> 
        <!-- Título principal da página -->
        <h2 class="h2">Lista de Compras</h2>
    </header>
    <br><hr>
    <!-- Orientação para o usuário -->
    <h2><u> Adicione produtos a sua lista </u></h2>
    <!-- Campo para digitar o nome do produto -->
    <h2> Produto </h2>
    <input type="text" id="produto" placeholder="Nome do produto">
    <!-- Campo para selecionar a categoria do produto -->
    <h2 class="h2"> Categoria </h2>
    <select id="Categoria">
        <option value="">Selecione</option>
        <option value="Limpeza">Limpeza </option>
        <option value="Frutas">Frutas </option>
        <option value="Bebidas">Bebidas </option>
    </select>
    <!-- Botão para adicionar o produto -->
    <button id="adicionar" onclick='adicionar()'> adicionar</button>
    <br><br>
    <hr>  
    <!-- Título da seção de produtos adicionados -->
    <h2> produtos adicionados </h2>

    <ul id="Limpeza"> <h3 class="h3">Limpeza</h3>
    </ul>

    <ul id="Frutas"> <h3 class="h3">Frutas</h3>
    </ul>

    <ul id="Bebidas"> <h3 class="h3">Bebidas</h3>
    </ul>
    <br><br>
   
    <hr>

    <!-- Título da lista de produtos concluídos -->
    <h2 class="h2">Lista completa</h2>

    <!-- Lista de produtos concluídos -->
    <ul id="concluidos">
    </ul>
   
</body>
</html>
