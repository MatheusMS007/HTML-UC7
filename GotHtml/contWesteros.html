<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Visitante</title>
</head>

<body>

    <h1>Área do Visitante</h1>
    <p>Para deixar uma sugestão ou tirar dúvidas, preencha o formulário abaixo:</p>

    <form action="got.html" method="post">
        <label for="nome">* Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required pattern="[azAZ]+"
            maxlength="100"><br><br>

        <label for="sexo">Sexo: </label>
        <input type="radio" id="masc" value="Masculino">Masculino
        <input type="radio" id="fem" value="Feminino">Feminino
        <br><br>

        <label for="email">* Email:</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required><br><br>

        <label for="telefone">* Telefone:</label>
        <input type="tel" id="telefone" placeholder="(99)999999999"><br><br>

        <label for="messagem">Dúvida ou sugestão:</label><br>
        <textarea id="messagem" placeholder="Digite sua dúvida ou sugestão aqui..."
        rows="10" cols="30" required></textarea><br><br> <!--rows = linhas da caixa/ cols= largura da caixa -->


        <p>* Campos obrigatórios</p>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
    
</body>
</html>
