<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Site de instituição de ensino focado em tecnologia.">
    <meta http-equiv="refresh" content="30s">
    <meta name="author" content="Silva. Matheus">
    <link rel="stylesheet" href="../css/secTech.css">
    <title>Secretaria InovaTech</title>

</head>

<body>

    <!-- Cabeçalho da página com logo e título -->
        <header>
        <div class="brand"> <!-- junta logo e texto -->
            <img src="../midias/inovaTech-Photoroom.png" alt="logo">
            <div class="brand-text">
                <h1>Bem-vindo à Inova Tech</h1> <!-- separa o texto da imagem -->
                <h3>Centro de Capacitação Profissional</h3>
            </div>
        </div>
    </header>

    <!-- Área do menu -->
    <nav id="menuSec">
        <a href="inovaT.html">Ínicio</a>
        <a href="cursos.html">Cursos</a>
    </nav>

    <!-- formulários da secretaria -->
    <section id="forms1">

        <!-- Div formulário de contato -->
        <div id="contatoSec">
        <h2>Secretaria - Contato</h2>
        <p>Preencha o formulário.</p>
       

        <form action="inovaT.html" method="post">
            <label for="nome">*Nome:</label>
            <input type="text" id="nome" placeholder="Seu nome" required><br><br>
            
            <label for="email">*E-mail:</label>
            <input type="email" id="email" placeholder="Seu e-mail" required><br><br>
           
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="Seu telefone"><br><br>

            <label for="assunto">*Qual o assunto?</label>
            <input type="text" id="assunto" placeholder="Digite o assunto"><br><br>
            
            <label for="curso">Cursos:</label>
            <select id="curso">
                <option value=""></option>
                <option value="cursoAdm">Administração de redes</option>
                <option value="cursoCyber">Cybersecurity</option>
                <option value="cursoDesenv">Desenvolvimento web</option>
            </select><br>

            <label for="mensagem">Digite sua Mensagem:</label><br>
            <textarea id="mensagem" rows="5" cols="30" placeholder="Digite sua mensagem..." required>
            </textarea><br>

            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
        </div>

        <!-- Div para o formulário de matrícula -->
        <div id="matriculaSec">
        <h2>Faça sua Matrícula</h2>
        <form id="" action="cursos.html" method="post">

            <label for="nome">*Nome:</label>
            <input type="text" id="nome" placeholder="Seu nome" required maxlength="200"><br><br>


            <label for="cpf">*CPF:</label>
            <input type="text" id="cpf" placeholder="Seu cpf" required pattern="[0-9]" maxlength="11"><br><br>


            <label for="email">*E-mail:</label>
            <input type="email" id="email" placeholder="Seu email" required maxlength="200"><br><br>


            <label for="telefone">*Telefone:</label>
            <input type="tel" id="telefone" placeholder="Seu telefone" required><br><br>


            <label for="dataNasc">Data Nascimento:</label>
            <input type="date" id="dataNasc" placeholder="Sua data nascimento" required max="2010-01-01"><br><br>


            <label for="sexo">Sexo:</label>
            <select id="sexo">
                <option value=""></option>
                <option >Masculino</option>
                <option >Feminino</option>
                <option >Outro</option>
            </select><br><br>


             <label for="escolaridade">Nível escolar:</label>
            <select id="escolaridade">
                <option value=""></option>
                <option >Médio completo</option>
                <option >Médio incompleto</option>
                <option >Tec. completo</option>
                <option >Tec. incompleto</option>
            </select><br><br>

             <!-- Botão de envio -->
             <input type="submit" value="Enviar">
             <input type="reset" value="Limpar">
            </div>


        </form>

    </section>

        <footer>
        <P></P>
        <h4>Redes Sociais</h4>
    <ul>
        <li><a href="#">Instagram</a></li>
        <li><a href="#">Facebook</a></li>
        <li><a href="#">LinkedIn</a></li>
    </ul>
        <p>© 2026 InovaTech - Todos os direitos reservados</p>
    </footer>
    
</body>

</html>
